name: Vercel build check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: vercel-build-check-${{ github.ref }}
  # Keep older main-branch checks running. GitHub reports cancelled checks as
  # failed notification emails, which is noisy when several dashboard commits
  # are pushed back-to-back.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  vercel-build-check:
    # Avoid the floating ubuntu-latest pool for this lightweight check; hosted
    # runner acquisition failures on ubuntu-latest can cancel the job before
    # any build step logs exist.
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vercel build command
        run: npm run build:verify

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser regression suite
        run: npm run test:dashboard:e2e
