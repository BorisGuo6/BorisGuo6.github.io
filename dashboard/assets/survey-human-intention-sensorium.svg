  <rect x="976" y="330" width="144" height="78" rx="10" fill="#fff1f2" stroke="#dc2626" stroke-width="2"/>
  <text x="1048" y="376" font-size="23" font-weight="800" fill="#17202b" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">VTLA</text>
  <rect x="976" y="442" width="144" height="78" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1048" y="488" font-size="23" font-weight="800" fill="#17202b" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">AgenticSim</text>
