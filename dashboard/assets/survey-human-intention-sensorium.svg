<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-label="Human Intention Data Collection Proposal">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/></marker>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M 34 0 H 0 V 34" fill="none" stroke="#dbe4ee" stroke-width="1" opacity="0.55"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#f7faf9"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity="0.5"/>
  <rect x="46" y="42" width="1108" height="674" rx="18" fill="#ffffff" stroke="#d8e1ec" stroke-width="2" filter="url(#shadow)"/>
  <rect x="46" y="42" width="10" height="674" rx="5" fill="#0f766e"/>
  <text x="86" y="92" font-size="18" font-weight="700" fill="#0f766e" text-anchor="start" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">XLA DATA COLLECTION PROPOSAL</text>
  <text x="86" y="136" font-size="38" font-weight="800" fill="#17202b" text-anchor="start" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Human Intention Data Collection</text>
  <rect x="86" y="202" width="300" height="126" rx="10" fill="#ecfeff" stroke="#0f766e" stroke-width="2"/>
  <text x="236" y="246" font-size="25" font-weight="800" fill="#17202b" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Intention first</text>
  <text x="236" y="281" font-size="18" font-weight="500" fill="#5c6b7a" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">gaze, EMG, EEG</text>
  <text x="236" y="306" font-size="18" font-weight="500" fill="#5c6b7a" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">wrist ultrasound</text>
  <rect x="86" y="372" width="300" height="126" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="236" y="416" font-size="25" font-weight="800" fill="#17202b" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Interaction body</text>
  <text x="236" y="451" font-size="18" font-weight="500" fill="#5c6b7a" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">wrist cam, tactile</text>
  <text x="236" y="476" font-size="18" font-weight="500" fill="#5c6b7a" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">whole body pose</text>
