  <text x="825" y="638" font-size="22" font-weight="650" fill="#334155" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Partner ask: synchronized raw streams for XLA fusion.</text>
</svg>
