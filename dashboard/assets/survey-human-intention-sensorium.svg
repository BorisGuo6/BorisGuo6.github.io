  <text x="680" y="396" font-size="20" font-weight="650" fill="#334155" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">target + affordance</text>
  <text x="680" y="428" font-size="20" font-weight="650" fill="#334155" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">contact onset + force</text>
  <text x="680" y="460" font-size="20" font-weight="650" fill="#334155" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">hesitation + correction</text>
  <text x="680" y="492" font-size="20" font-weight="650" fill="#334155" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">failure + confidence</text>
