  <text x="236" y="583" font-size="24" font-weight="800" fill="#17202b" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Physical events</text>
  <text x="236" y="618" font-size="18" font-weight="500" fill="#5c6b7a" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">prox, temp, vib, audio</text>
  <line x1="402" y1="424" x2="510" y2="424" stroke="#0f766e" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
