<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Online sensor calibration and drift adaptation</title>
  <desc id="desc">Environmental drift enters a calibration-state estimator, passes through safety gates, then feeds corrected robot-learning observations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: Avenir Next, Helvetica Neue, Arial, sans-serif; }
      .h { font-size: 28px; font-weight: 800; fill: #17202b; }
      .s { font-size: 18px; font-weight: 500; fill: #5f6f7f; }
      .t { font-size: 20px; font-weight: 700; fill: #334155; }
      .small { font-size: 15px; font-weight: 600; fill: #64748b; }
    </style>
  </defs>
  <rect width="1200" height="720" fill="#f8fbff"/>
  <rect x="34" y="34" width="1132" height="652" rx="18" fill="#ffffff" stroke="#d8e4ef" stroke-width="2"/>
  <text x="74" y="92" class="h">ONLINE SENSOR CALIBRATION</text>
  <text x="74" y="124" class="s">Estimate drift state before data reaches policies, world models, or XLA schemas</text>

  <rect x="74" y="180" width="220" height="136" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="184" y="232" text-anchor="middle" class="h">Drift inputs</text>
  <text x="184" y="266" text-anchor="middle" class="s">temperature, light</text>
  <text x="184" y="294" text-anchor="middle" class="s">magnetic field, aging</text>

  <line x1="306" y1="248" x2="368" y2="248" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="382" y="180" width="266" height="136" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="515" y="226" text-anchor="middle" class="h">Calib state</text>
  <text x="515" y="260" text-anchor="middle" class="s">intrinsics, extrinsics</text>
  <text x="515" y="288" text-anchor="middle" class="s">bias, baseline, confidence</text>

  <line x1="660" y1="248" x2="722" y2="248" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="736" y="180" width="218" height="136" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="845" y="226" text-anchor="middle" class="h">Correct</text>
  <text x="845" y="260" text-anchor="middle" class="s">bounded residual</text>
  <text x="845" y="288" text-anchor="middle" class="s">or reject update</text>

  <line x1="966" y1="248" x2="1024" y2="248" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1036" y="180" width="112" height="136" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="1092" y="234" text-anchor="middle" class="t">Gate</text>
  <text x="1092" y="264" text-anchor="middle" class="small">rollback</text>
  <text x="1092" y="288" text-anchor="middle" class="small">recapture</text>

  <rect x="120" y="424" width="244" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="242" y="470" text-anchor="middle" class="t">Classical anchor</text>
  <text x="242" y="500" text-anchor="middle" class="s">offline calibration</text>
  <text x="242" y="526" text-anchor="middle" class="s">fiducials, robot FK</text>

  <rect x="444" y="424" width="274" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="581" y="470" text-anchor="middle" class="t">Self-supervised loss</text>
  <text x="581" y="500" text-anchor="middle" class="s">reprojection, VIO</text>
  <text x="581" y="526" text-anchor="middle" class="s">contact and depth consistency</text>

  <rect x="798" y="424" width="270" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="933" y="470" text-anchor="middle" class="t">Consumers</text>
  <text x="933" y="500" text-anchor="middle" class="s">Real-Robot Infra, UMI</text>
  <text x="933" y="526" text-anchor="middle" class="s">VTLA, XLA data capture</text>

  <line x1="242" y1="424" x2="480" y2="324" stroke="#0f766e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="581" y1="424" x2="580" y2="324" stroke="#0f766e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="845" y1="324" x2="933" y2="424" stroke="#0f766e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="74" y="622" class="s">Decision: keep as Survey until v0 benchmark defines observability, confidence thresholds, and rollback policy.</text>
</svg>
