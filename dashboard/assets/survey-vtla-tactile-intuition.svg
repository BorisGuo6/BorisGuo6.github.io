ity="1"/><text x="901.0" y="318.0" font-size="28" font-weight="800" fill="#17202b" text-anchor="middle" opacity="1" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Policy / WM</text><text x="901.0" y="358.0" font-size="18" font-weight="500" fill="#5c6b7a" text-anchor="middle" opacity="1" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">failure evidence</text><rect x="820" y="500" width="310" height="92" rx="10" fill="#f9fafb" stroke="#cbd5e1" stroke-width="2" opacity="1"/><text x="846" y="536" font-size="24" font-weight="800" fill="#17202b" text-anchor="start" opacity="1" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Representation</text><text x="846" y="566.0" font-size="17" font-weight="500" fill="#627082" text-anchor="start" opacity="1" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">tactile as oracle, memory, or</text>
