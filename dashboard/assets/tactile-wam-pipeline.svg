<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Tactile-WAM video to touch to action pipeline</title>
  <desc id="desc">A three-stage proposal: external camera human hand retargeting controls a robot arm and hand video world model, generated videos are used to predict tactile contact maps, and the predictive world model is extended into a World Action Model that outputs executable robot actions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2b5d8f"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#16324f" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #d8e2ea; stroke-width: 2; rx: 22; }
      .stage-a { fill: #eef6ff; stroke: #9fc3e8; stroke-width: 2; rx: 20; }
      .stage-b { fill: #ecfdf5; stroke: #8fd3b4; stroke-width: 2; rx: 20; }
      .stage-c { fill: #fff7ed; stroke: #edbd72; stroke-width: 2; rx: 20; }
      .core { fill: #ffffff; stroke: #365f86; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .output { fill: #fef2f2; stroke: #efa5a5; stroke-width: 2; rx: 18; }
      .caption { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .title { font: 800 42px Arial, Helvetica, sans-serif; fill: #172233; letter-spacing: 0; }
      .subtitle { font: 500 21px Arial, Helvetica, sans-serif; fill: #5f7081; letter-spacing: 0; }
      .label { font: 800 28px Arial, Helvetica, sans-serif; fill: #172233; letter-spacing: 0; }
      .small { font: 500 21px Arial, Helvetica, sans-serif; fill: #607284; letter-spacing: 0; }
      .mono { font: 700 22px Arial, Helvetica, sans-serif; fill: #24527e; letter-spacing: 0; }
      .tiny { font: 600 18px Arial, Helvetica, sans-serif; fill: #6b7c8e; letter-spacing: 0; }
      .wire { stroke: #2b5d8f; stroke-width: 7; fill: none; marker-end: url(#arrow); }
      .wire-teal { stroke: #0f766e; stroke-width: 6; fill: none; marker-end: url(#arrow-teal); }
      .dash { stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 10 10; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="78">Tactile-WAM: Video-to-Touch World Action Model</text>
  <text class="subtitle" x="72" y="116">Wuji proposal track: robot arm+hand video control, tactile prediction, then action generation</text>

  <rect class="panel" x="55" y="155" width="1490" height="620"/>
  <text class="tiny" x="95" y="200">DEMO 3: HUMAN-TO-ROBOT VIDEO CONTROL</text>
  <text class="tiny" x="590" y="200">DEMO 1: TACTILE WORLD MODEL</text>
  <text class="tiny" x="1090" y="200">FINAL: WORLD ACTION MODEL</text>

  <rect class="stage-a" x="95" y="245" width="360" height="150"/>
  <text class="label" x="126" y="296">External camera</text>
  <text class="small" x="126" y="334">tracks human hand / arm</text>
  <text class="mono" x="126" y="365">human motion tokens</text>

  <rect class="stage-a" x="95" y="465" width="360" height="150"/>
  <text class="label" x="126" y="516">Retarget controller</text>
  <text class="small" x="126" y="554">maps human motion into</text>
  <text class="mono" x="126" y="585">robot arm + hand video</text>

  <path class="wire" d="M275 400 L275 455"/>

  <rect class="core" x="540" y="280" width="430" height="270"/>
  <text class="label" x="590" y="335">Robot video world model</text>
  <text class="small" x="590" y="376">conditioned by retargeted motion</text>
  <text class="small" x="590" y="412">generates arm-hand-object rollout</text>
  <rect class="caption" x="615" y="455" width="280" height="66"/>
  <text class="mono" x="650" y="497">future RGB / depth / layers</text>

  <path class="wire" d="M460 540 C510 540 510 418 532 418"/>

  <rect class="stage-b" x="1060" y="245" width="380" height="150"/>
  <text class="label" x="1092" y="296">Video -> tactile</text>
  <text class="small" x="1092" y="334">estimate contact, pressure, slip</text>
  <text class="mono" x="1092" y="365">tactile map sequence</text>

  <rect class="stage-c" x="1060" y="465" width="380" height="150"/>
  <text class="label" x="1092" y="516">Tactile-WAM head</text>
  <text class="small" x="1092" y="554">jointly predicts state + action</text>
  <text class="mono" x="1092" y="585">a_t, video_t+1, tactile_t+1</text>

  <path class="wire-teal" d="M976 390 C1012 390 1018 320 1052 320"/>
  <path class="wire" d="M976 445 C1012 445 1018 540 1052 540"/>
  <path class="wire-teal" d="M1250 400 L1250 455"/>

  <rect class="output" x="555" y="635" width="510" height="88"/>
  <text class="label" x="602" y="682">Actionable output</text>
  <text class="small" x="602" y="714">predictive model becomes a controller, not only a simulator</text>
  <path class="dash" d="M1250 620 C1250 690 1115 680 1075 680"/>

  <text class="tiny" x="92" y="835">Core claim: do not stop at video imagination. Ground the generated robot-arm/hand rollout with predicted tactile evidence, then train a WAM that emits executable robot actions.</text>
</svg>
