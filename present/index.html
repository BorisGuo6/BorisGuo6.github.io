    <style>
      :root {
        --deck-bg: #0b1117;
        --deck-ink: #f8fafc;
        --deck-muted: rgba(248, 250, 252, 0.72);
        --deck-line: rgba(148, 163, 184, 0.34);
        --deck-accent: #18a394;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--deck-bg);
      }

      body {
        color: var(--deck-ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .deck-topbar {
        position: fixed;
        z-index: 30;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 42px;
        padding: 8px 14px;
        background: rgba(11, 17, 23, 0.82);
        border-bottom: 1px solid var(--deck-line);
        backdrop-filter: blur(16px);
        transition: transform 180ms ease, opacity 180ms ease;
      }

      body.full-video-active .deck-topbar {
        transform: translateY(-100%);
        opacity: 0;
        pointer-events: none;
      }

      .deck-topbar a,
      .deck-topbar span {
        color: var(--deck-muted);
        font-size: 12px;
        line-height: 1;
        text-decoration: none;
      }

      .deck-topbar strong {
        color: var(--deck-ink);
        font-size: 12px;
        font-weight: 800;
      }

      .deck-topbar nav {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .deck-topbar a:hover {
        color: #ffffff;
      }

      .reveal {
        background: var(--deck-bg);
      }

      .reveal .slides {
        text-align: left;
      }

      .reveal section {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05080c;
      }

      .slide-frame {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: #05080c;
      }

      .reveal .slide-image {
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        object-fit: contain;
        display: block;
        background: #05080c;
      }

      section.source-animated-static.present .slide-frame {
        animation: source-frame-enter 520ms ease-out both;
      }

      @keyframes source-frame-enter {
        from {
          opacity: 0;
          transform: scale(0.985);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      section.video-image-hidden .slide-image {
        opacity: 0;
      }

      .video-layer {
        position: absolute;
        z-index: 5;
        inset: 0;
        pointer-events: none;
      }

      .reveal .asset-overlay {
        position: absolute;
        z-index: 4;
        max-width: none;
        max-height: none;
        object-fit: contain;
        pointer-events: none;
      }

      .mask-overlay,
      .text-overlay {
        position: absolute;
        pointer-events: none;
      }

      .mask-overlay {
        z-index: 6;
        background: #ffffff;
      }

      .text-overlay {
        z-index: 7;
        color: #000000;
        font-family: "Times New Roman", Times, serif;
        font-size: var(--overlay-font-size, 34px);
        font-weight: var(--overlay-font-weight, 400);
        line-height: 1;
        white-space: nowrap;
      }

      .video-slot {
        position: absolute;
        overflow: hidden;
        background: #000000;
        pointer-events: auto;
      }

      .video-slot video {
        display: block;
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        object-fit: var(--video-fit, cover);
      }

      .video-layer-full .video-slot {
        inset: 0;
      }

      .video-layer-main .video-slot {
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      }

      .video-layer-clean .video-slot {
        box-shadow: none;
      }

      .video-layer-clean video {
        background: transparent;
      }

      .fallback-video-strip {
        position: absolute;
        top: auto;
        left: auto;
        right: 18px;
        bottom: 18px;
        z-index: 6;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(180px, 260px);
        gap: 10px;
        max-width: min(92vw, 1280px);
        overflow-x: auto;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(4, 8, 14, 0.62);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(16px);
      }

      .fallback-video-strip .video-slot {
        position: static;
        display: block;
        width: 260px;
        height: 146px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      .loading-state,
      .error-state {
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100vh;
        padding: 24px;
        color: var(--deck-muted);
        text-align: center;
      }

      .loading-state strong,
      .error-state strong {
        display: block;
        margin-bottom: 8px;
        color: var(--deck-ink);
        font-size: 18px;
      }

      .asset-warning {
        position: fixed;
        z-index: 30;
        top: 86px;
        left: 50%;
        width: min(720px, calc(100vw - 32px));
        transform: translateX(-50%);
        padding: 11px 14px;
        border: 1px solid rgba(41, 182, 169, 0.45);
        background: rgba(8, 18, 22, 0.94);
        color: #e8f7f5;
        font: 600 13px/1.45 Arial, Helvetica, sans-serif;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.25);
      }

      .asset-warning[hidden] {
        display: none;
      }

      .reveal .controls,
      .reveal .progress {
        color: var(--deck-accent);
      }

      .reveal .slide-number {
        right: 14px;
        bottom: 8px;
        background: rgba(11, 17, 23, 0.74);
        color: rgba(255, 255, 255, 0.84);
        font-size: 11px;
      }

      @media (max-width: 760px) {
        .deck-topbar {
          min-height: 38px;
          padding: 7px 10px;
        }

        .deck-topbar nav {
          gap: 8px;
        }

        .deck-topbar span {
          display: none;
        }

        .fallback-video-strip {
          left: 10px;
          right: 10px;
          bottom: 12px;
          grid-auto-columns: minmax(140px, 68vw);
          padding: 8px;
        }

        .fallback-video-strip .video-slot {
          width: min(68vw, 260px);
          height: min(38vw, 146px);
        }
      }
    </style>

        if (!assetWarning || missingAssetWarningShown) {
          return;
        }
        missingAssetWarningShown = true;
        assetWarning.hidden = false;
      }

      function labelForVideo(video, index) {
        if (video.externalSource) {
          return `Video ${index + 1} · ${video.externalSource}`;
        }
        return `Video ${index + 1}`;
      }

      function videoSource(video) {
        return video.externalUrl || video.asset;

      function percentStyle(slot) {
        return `left:${slot.x}%;top:${slot.y}%;width:${slot.w}%;height:${slot.h}%;`;
      }

      function videoKey(video) {
        return [
          video.externalUrl || "",
          video.asset || "",
          video.sourcePart || "",
        ].join(" ");
      }

      function makeSlotPlayer(slide, video, index, slot) {
        const wrapper = document.createElement("div");
        wrapper.className = "video-slot";
        wrapper.style.cssText = percentStyle(slot);
        wrapper.style.setProperty("--video-fit", slot.fit || "cover");
        const manualControls = Boolean(slot.manualControls);

        const player = document.createElement("video");
        player.src = videoSource(video);
        player.controls = manualControls;
        player.autoplay = !manualControls;
        player.muted = !manualControls;
        player.loop = !manualControls;
        player.playsInline = true;
        player.disablePictureInPicture = true;
        if (!manualControls) {
          player.setAttribute("data-autoplay", "");
        }
        player.preload = "auto";
        player.poster = slide.image;
        player.setAttribute("aria-label", labelForVideo(video, index));
        player.addEventListener("error", markMissingAsset, { once: true });
        if (slot.start != null) {
          player.currentTime = slot.start;
        }
        if (slot.end != null) {
          player.dataset.endAt = String(slot.end);
        }
        player.addEventListener("loadedmetadata", () => {
          if (slot.start != null && player.currentTime < slot.start) {
            player.currentTime = slot.start;
          }
          if (!manualControls) {
            playIfActive(player);
          }
        });
        player.addEventListener("canplay", () => {
          if (!manualControls) {
            playIfActive(player);
          }
        });
        player.addEventListener("timeupdate", () => {
          const endAt = Number(player.dataset.endAt || 0);
          const startAt = slot.start || 0;
          if (endAt > 0 && player.currentTime >= endAt) {
            player.currentTime = startAt;
            playIfActive(player);
          }
        });

        const label = document.createElement("span");
        label.className = "sr-only";
        label.textContent = labelForVideo(video, index);
        wrapper.append(player, label);
        return wrapper;
      }

      function slotForVideo(slots, video, index) {
        const key = videoKey(video).toLowerCase();
        const matched = slots.find((slot) => slot.key && key.includes(slot.key.toLowerCase()));
        return matched || slots[index] || slots[slots.length - 1];
      }

      function isActiveSlide(section) {
        return section && section.classList.contains("present");
      }

      function playIfActive(video) {
        const ownerSlide = video.closest("section[data-output-slide]");
        if (isActiveSlide(ownerSlide) && video.muted) {
          video.play().catch(() => {});
        }
      }

      function syncDeckChrome(currentSlide) {
        document.body.classList.toggle(
          "full-video-active",
          Boolean(currentSlide?.querySelector(".video-layer-full"))
        );
      }

      function buildVideoLayer(slide) {
        const layoutKey = `${slide.source}:${slide.sourceSlide}`;
        const layout = VIDEO_LAYOUTS[layoutKey];
        const layer = document.createElement("div");
        layer.className = `video-layer ${layout?.className || "fallback-video-strip"}`;
        const slots = layout?.slots || slide.videos.map(() => ({ x: 0, y: 0, w: 100, h: 100 }));
        slide.videos.forEach((video, index) => {
          layer.append(makeSlotPlayer(slide, video, index, slotForVideo(slots, video, index)));
        });
        return { layer, hideImage: Boolean(layout?.hideImage) };
      }

      function buildImageOverlays(slide) {
        const overlays = IMAGE_OVERLAYS[`${slide.source}:${slide.sourceSlide}`] || [];
        return overlays.map((overlay) => {
          const image = document.createElement("img");
          image.className = "asset-overlay";
          image.src = overlay.src;
          image.alt = "";
          image.style.cssText = percentStyle(overlay);
          return image;
        });
      }

      function buildHtmlOverlays(slide) {
        const overlays = HTML_OVERLAYS[`${slide.source}:${slide.sourceSlide}`] || [];
        return overlays.map((overlay) => {
          const element = document.createElement("span");
          element.className = overlay.type === "mask" ? "mask-overlay" : "text-overlay";
          element.style.cssText = percentStyle(overlay);
          if (overlay.fontSize) {
            element.style.setProperty("--overlay-font-size", overlay.fontSize);
          }
          if (overlay.fontWeight) {
            element.style.setProperty("--overlay-font-weight", overlay.fontWeight);
          }
          if (overlay.textAlign) {
            element.style.textAlign = overlay.textAlign;
          }
          element.textContent = overlay.text || "";
          return element;
        });
      }

      function useFadeTransition(slide) {
        return slide.source === "interview" && slide.sourceSlide >= 27 && slide.sourceSlide <= 32;
      }

      function slideSourceKey(slide) {
        return `${slide.source}:${slide.sourceSlide}`;
      }

      function buildSlide(slide) {
        const section = document.createElement("section");
        section.dataset.source = slide.source;
        section.dataset.sourceSlide = String(slide.sourceSlide);
        section.dataset.outputSlide = String(slide.slide);
        section.dataset.chapter = slide.chapterTitle || "";
        if (useFadeTransition(slide)) {
          section.setAttribute("data-transition", "fade");
          section.setAttribute("data-background-transition", "fade");
        }
        if (SOURCE_ANIMATED_STATIC_SLIDES.has(slideSourceKey(slide))) {
          section.classList.add("source-animated-static");
          section.setAttribute("data-transition", "fade");
          section.setAttribute("data-background-transition", "fade");
        }

        const frame = document.createElement("div");
        frame.className = "slide-frame";

        const image = document.createElement("img");
        image.className = "slide-image";
        image.src = slide.image;
        image.loading = slide.slide <= 3 ? "eager" : "lazy";
        image.addEventListener("error", markMissingAsset, { once: true });
        image.alt = slide.title
          ? `Slide ${slide.slide}: ${slide.title}`
          : `Slide ${slide.slide} from ${slide.sourceFile}`;
        frame.append(image);
        section.append(frame);

        const overlays = buildImageOverlays(slide);
        if (overlays.length > 0) {
          section.append(...overlays);
        }
        const htmlOverlays = buildHtmlOverlays(slide);
        if (htmlOverlays.length > 0) {
          section.append(...htmlOverlays);
        }

        if (Array.isArray(slide.videos) && slide.videos.length > 0) {
          const { layer, hideImage } = buildVideoLayer(slide);
          if (hideImage) {
            section.classList.add("video-image-hidden");
          }
          section.append(layer);
        }

        const notes = document.createElement("aside");
        notes.className = "notes";
        notes.textContent = [
          `Output slide ${slide.slide}`,
          `${slide.sourceFile} slide ${slide.sourceSlide}`,
          slide.hiddenInSource ? "Hidden in original PowerPoint source." : "",
          slide.title || "",
        ].filter(Boolean).join("\\n");
        section.append(notes);

        return section;
      }

      function buildChapter(chapter, slides) {
        const chapterSlides = slides
          .filter((slide) => slide.slide >= chapter.start && slide.slide <= chapter.end)
          .map((slide) => ({ ...slide, chapterTitle: chapter.title }));
        const stack = document.createElement("section");
        stack.dataset.chapter = chapter.title;
        stack.setAttribute("aria-label", chapter.title);
        stack.append(...chapterSlides.map(buildSlide));
        return stack;
      }

      function buildDeck(slides) {
        return CHAPTERS.map((chapter) => buildChapter(chapter, slides));
      }

      function pauseOffscreenVideos(event) {
        const currentSlide = event?.currentSlide || Reveal.getCurrentSlide?.();
        syncDeckChrome(currentSlide);
        document.querySelectorAll(".reveal video").forEach((video) => {
          const ownerSlide = video.closest("section[data-output-slide]");
          if (ownerSlide !== currentSlide) {
            video.pause();
          }
        });
        currentSlide?.querySelectorAll("video").forEach((video) => {
          if (video.muted) {
            video.play().catch(() => {});
          }
        });
      }

      async function initDeck() {
        try {
          const response = await fetch("slide-manifest.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Unable to load slide-manifest.json (${response.status})`);
          }
          const manifest = await response.json();
          slidesRoot.replaceChildren(...buildDeck(manifest.slides));
          await Reveal.initialize({
            hash: true,
            width: 1600,
            height: 900,
            margin: 0,
            minScale: 0.2,
            maxScale: 2,
            controls: true,
            progress: true,
            center: false,
            slideNumber: "c/t",
            scrollActivationWidth: 0,
            transition: "none",
            backgroundTransition: "none",
            plugins: [RevealNotes],
          });
          Reveal.on("ready", pauseOffscreenVideos);
          Reveal.on("slidechanged", pauseOffscreenVideos);
          pauseOffscreenVideos({ currentSlide: Reveal.getCurrentSlide?.() });
        } catch (error) {
          slidesRoot.replaceChildren();
          const section = document.createElement("section");
          section.innerHTML = `<div class="error-state"><p><strong>Presentation assets unavailable</strong>${error.message}</p></div>`;
          slidesRoot.append(section);
          await Reveal.initialize({ controls: false, progress: false, transition: "none" });
        }
      }

      initDeck();
    </script>
  </body>
</html>
